spring.application.name=brainflex


# Tell Spring to load the .env file as a configuration source
spring.config.import=optional:file:../.env[.properties]

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}


# Disable strict check for MongoDB and Redis on startup
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

spring.docker.compose.enabled=false

logging.level.org.springframework.security=DEBUG

spring.mongodb.uri=${MONGO_URI}

# Now map the environment variables to the OAuth settings
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}


