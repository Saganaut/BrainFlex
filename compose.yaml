services:
  mongodb:
    image: "mongo:latest"
    environment:
      - "MONGO_INITDB_DATABASE=brainflex"
      - "MONGO_INITDB_ROOT_PASSWORD=secret"
      - "MONGO_INITDB_ROOT_USERNAME=root"
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data
  redis:
    image: redis/redis-stack-server:latest
    container_name: brainflex-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    # environment:
    #   - REDIS_ARGS=--requirepass password
    command:
      ["redis-server", "--requirepass", "password", "--protected-mode", "no"]
    volumes:
      - redis-data:/data
  garage:
    image: dxflrs/garage:v1.0.1
    container_name: brainflex-garage
    ports:
      - "3900:3900"   # S3 API
      - "3903:3903"   # Admin API
    volumes:
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
      - ./garage.toml:/etc/garage.toml:ro
volumes:
  mongo-data:
  redis-data:
  garage-meta:
  garage-data:
